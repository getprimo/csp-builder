<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
  </g>

  <!-- corner ribbon mimic -->
  <g transform="translate(1080 80) rotate(45)">
    <rect x="-180" y="-20" width="360" height="40" fill="url(#accent)" opacity="0.95"/>
    <text x="0" y="7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0a0a0a" text-anchor="middle" letter-spacing="1.2">BUILT BY PRIMO</text>
  </g>

  <!-- badge -->
  <g transform="translate(72 88)">
    <rect x="0" y="0" width="160" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="80" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff" fill-opacity="0.85" text-anchor="middle" letter-spacing="2">FREE · CLIENT-SIDE</text>
  </g>

  <!-- main title -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" fill="#ffffff">
    <text x="72" y="220" font-size="104" font-weight="700" letter-spacing="-2">
      <tspan>CSP</tspan>
      <tspan fill="url(#accent)" dx="24">Builder</tspan>
    </text>
    <text x="72" y="310" font-size="32" font-weight="500" fill="#ffffff" fill-opacity="0.85">
      ADMX → SyncML for Windows MDM
    </text>
  </g>

  <!-- subtitle -->
  <text x="72" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="400" fill="#ffffff" fill-opacity="0.78">
    Windows CSP · ADMX ingestion · FleetDM &amp; Intune
  </text>

  <!-- feature chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500">
    <g transform="translate(72 450)">
      <rect width="260" height="48" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="130" y="31" fill="#ffffff" fill-opacity="0.92" text-anchor="middle">3,000+ CSP settings</text>
    </g>
    <g transform="translate(348 450)">
      <rect width="240" height="48" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="120" y="31" fill="#ffffff" fill-opacity="0.92" text-anchor="middle">10 ADMX samples</text>
    </g>
    <g transform="translate(604 450)">
      <rect width="240" height="48" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="120" y="31" fill="#ffffff" fill-opacity="0.92" text-anchor="middle">5 export formats</text>
    </g>
  </g>

  <!-- bottom bar: domain + primo -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <text x="72" y="570" font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.4">
      csp-builder.getprimo.com
    </text>

    <g transform="translate(952 542)">
      <rect x="0" y="0" width="176" height="56" rx="12" fill="#ffffff"/>
      <text x="88" y="36" font-size="22" font-weight="700" fill="#0a0a0a" text-anchor="middle">Primo</text>
    </g>
  </g>
</svg>
